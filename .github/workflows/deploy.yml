name: Deploy to Docker Hub

on:
  push:
    branches: [ "main" ] # Chạy khi có code mới đẩy lên nhánh main

jobs:
  build_and_push:
    runs-on: ubuntu-latest

    steps:
      # 1. Action lấy code từ Github
      - name: Checkout mã nguồn
        uses: actions/checkout@v6.0.2

      # 2. Action Đăng nhập Docker Hub
      - name: Đăng nhập vào Docker Hub
        uses: docker/login-action@v4.0.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # (Khuyên dùng) Cài đặt Buildx để hỗ trợ build image tốt hơn
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Action Đóng gói & Đẩy Image
      - name: Build và Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Tên image dựa theo thông tin trong file index.html của bạn
          tags: nguyenhoanganh111024/duanjava:latest
